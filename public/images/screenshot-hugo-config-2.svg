<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" width="920" height="660" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <style>
    .bg{ fill:#ffffff; }
    .topbar{ fill:#f6f8fa; }
    .gutter{ fill:#f6f8fa; }
    .ln{ fill:#8b949e; font-size:13px; }
    .k{ fill:#cf222e; }
    .s{ fill:#0a3069; }
    .c{ fill:#6e7781; font-style:italic; }
    .t{ fill:#24292f; }
    .tn{ fill:#57606a; font-family:-apple-system,Segoe UI,sans-serif; font-size:13px; }
    .kw{ fill:#8250df; }
  </style>

  <!-- 窗口装饰条 -->
  <rect class="topbar" x="0" y="0" width="920" height="36"/>
  <line x1="0" y1="36" x2="920" y2="36" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text class="tn" x="460" y="22" text-anchor="middle">hugo.toml</text>

  <!-- 主体 -->
  <rect class="bg" x="0" y="36" width="920" height="624"/>
  <rect class="gutter" x="0" y="36" width="52" height="624"/>
  <line x1="52" y1="36" x2="52" y2="660" stroke="#d0d7de" stroke-width="1"/>

  <g font-size="14">
    <!-- 26 -->
    <text class="ln" x="40" y="68" text-anchor="end">26</text>

    <!-- 27 [params] -->
    <text class="ln" x="40" y="92" text-anchor="end">27</text>
    <text class="kw" x="68" y="92">[params]</text>

    <!-- 28 注释 -->
    <text class="ln" x="40" y="116" text-anchor="end">28</text>
    <text class="c" x="84" y="116"># 覆盖 Ananke 默认的 body 样式（默认是 "avenir bg-near-white"）</text>

    <!-- 29 body_classes -->
    <text class="ln" x="40" y="140" text-anchor="end">29</text>
    <text class="k" x="84" y="140">body_classes</text>
    <text class="t" x="190" y="140">=</text>
    <text class="s" x="205" y="140">"custom-body"</text>

    <!-- 30 空 -->
    <text class="ln" x="40" y="164" text-anchor="end">30</text>

    <!-- 31 注释 -->
    <text class="ln" x="40" y="188" text-anchor="end">31</text>
    <text class="c" x="84" y="188"># 顶部 Header 背景（可写 Tachyons 类名，也可以写自定义 class）</text>

    <!-- 32 background_color_class -->
    <text class="ln" x="40" y="212" text-anchor="end">32</text>
    <text class="k" x="84" y="212">background_color_class</text>
    <text class="t" x="270" y="212">=</text>
    <text class="s" x="285" y="212">"site-header-bg"</text>

    <!-- 33 cover_dimming_class -->
    <text class="ln" x="40" y="236" text-anchor="end">33</text>
    <text class="k" x="84" y="236">cover_dimming_class</text>
    <text class="t" x="252" y="236">=</text>
    <text class="s" x="267" y="236">"bg-black-30"</text>

    <!-- 34 空 -->
    <text class="ln" x="40" y="260" text-anchor="end">34</text>

    <!-- 35 注释 -->
    <text class="ln" x="40" y="284" text-anchor="end">35</text>
    <text class="c" x="84" y="284"># 用于部分页面内容的默认文字颜色（Tachyons 类名）</text>

    <!-- 36 text_color -->
    <text class="ln" x="40" y="308" text-anchor="end">36</text>
    <text class="k" x="84" y="308">text_color</text>
    <text class="t" x="170" y="308">=</text>
    <text class="s" x="185" y="308">"near-black"</text>

    <!-- 37 date_format -->
    <text class="ln" x="40" y="332" text-anchor="end">37</text>
    <text class="k" x="84" y="332">date_format</text>
    <text class="t" x="175" y="332">=</text>
    <text class="s" x="190" y="332">"2006-01-02"</text>

    <!-- 38 read_more_copy -->
    <text class="ln" x="40" y="356" text-anchor="end">38</text>
    <text class="k" x="84" y="356">read_more_copy</text>
    <text class="t" x="205" y="356">=</text>
    <text class="s" x="220" y="356">"查看详情"</text>

    <!-- 39 custom_css -->
    <text class="ln" x="40" y="380" text-anchor="end">39</text>
    <text class="k" x="84" y="380">custom_css</text>
    <text class="t" x="170" y="380">=</text>
    <text class="s" x="185" y="380">["css/custom.css"]</text>

    <!-- 40 空 -->
    <text class="ln" x="40" y="404" text-anchor="end">40</text>

    <!-- 41 注释 -->
    <text class="ln" x="40" y="428" text-anchor="end">41</text>
    <text class="c" x="84" y="428"># Ananke 主题自定义</text>

    <!-- 42 [params.ananke] -->
    <text class="ln" x="40" y="452" text-anchor="end">42</text>
    <text class="kw" x="84" y="452">[params.ananke]</text>

    <!-- 43 注释 -->
    <text class="ln" x="40" y="476" text-anchor="end">43</text>
    <text class="c" x="100" y="476"># 挂载自定义样式（优先使用 ananke.custom_css；旧的 params.custom_css 已弃用）</text>

    <!-- 44 custom_css -->
    <text class="ln" x="40" y="500" text-anchor="end">44</text>
    <text class="k" x="100" y="500">custom_css</text>
    <text class="t" x="186" y="500">=</text>
    <text class="s" x="201" y="500">["css/custom.css"]</text>

    <!-- 45 show_recent_posts -->
    <text class="ln" x="40" y="524" text-anchor="end">45</text>
    <text class="k" x="100" y="524">show_recent_posts</text>
    <text class="t" x="245" y="524">=</text>
    <text class="kw" x="260" y="524">true</text>

    <!-- 46 空 -->
    <text class="ln" x="40" y="548" text-anchor="end">46</text>

    <!-- 47 注释 -->
    <text class="ln" x="40" y="572" text-anchor="end">47</text>
    <text class="c" x="68" y="572"># 首页最近文章数量（Ananke 会读取这个参数）</text>

    <!-- 48 recent_posts_number -->
    <text class="ln" x="40" y="596" text-anchor="end">48</text>
    <text class="k" x="68" y="596">recent_posts_number</text>
    <text class="t" x="220" y="596">=</text>
    <text class="s" x="235" y="596">6</text>

    <!-- 49 mainSections -->
    <text class="ln" x="40" y="620" text-anchor="end">49</text>
    <text class="k" x="68" y="620">mainSections</text>
    <text class="t" x="165" y="620">=</text>
    <text class="s" x="180" y="620">["posts"]</text>
  </g>
</svg>
