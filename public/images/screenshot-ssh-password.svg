<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <style>
    .bg{ fill:#282c34; }
    .gutter{ fill:#21252b; }
    .ln{ fill:#5c6370; font-size:13px; }
    .c{ fill:#5c6370; font-style:italic; }
    .kw{ fill:#e06c75; }
    .str{ fill:#e5c07b; }
    .t{ fill:#abb2bf; font-size:14px; }
  </style>

  <rect class="bg" x="0" y="0" width="760" height="200"/>
  <rect class="gutter" x="0" y="0" width="44" height="200"/>
  <line x1="44" y1="0" x2="44" y2="200" stroke="#3e4451" stroke-width="1"/>

  <g font-size="14">
    <text class="ln" x="36" y="38" text-anchor="end">64</text>
    <text class="c" x="60" y="38"># To disable tunneled clear text passwords, change to no here!</text>

    <text class="ln" x="36" y="66" text-anchor="end">65</text>
    <text class="kw" x="60" y="66">PasswordAuthentication</text>
    <text class="str" x="260" y="66">yes</text>

    <text class="ln" x="36" y="90" text-anchor="end">66</text>
    <text class="c" x="60" y="90">#PermitEmptyPasswords no</text>

    <text class="ln" x="36" y="114" text-anchor="end">67</text>
    <text class="t" x="60" y="114"></text>

    <text class="ln" x="36" y="138" text-anchor="end">68</text>
    <text class="t" x="60" y="138"></text>
  </g>
</svg>
