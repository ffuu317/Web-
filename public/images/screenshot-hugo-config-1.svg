<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <style>
    .bg{ fill:#ffffff; }
    .topbar{ fill:#f6f8fa; }
    .gutter{ fill:#f6f8fa; }
    .ln{ fill:#8b949e; font-size:13px; }
    .k{ fill:#cf222e; }
    .s{ fill:#0a3069; }
    .c{ fill:#6e7781; font-style:italic; }
    .t{ fill:#24292f; }
    .tn{ fill:#57606a; font-family:-apple-system,Segoe UI,sans-serif; font-size:13px; }
    .kw{ fill:#8250df; }
  </style>

  <!-- 窗口装饰条 -->
