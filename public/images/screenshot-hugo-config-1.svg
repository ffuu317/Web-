  <rect class="gutter" x="0" y="36" width="52" height="604"/>
  <line x1="52" y1="36" x2="52" y2="640" stroke="#d0d7de" stroke-width="1"/>

  <!-- 代码 + 行号 -->
  <g font-size="14">
    <!-- 行 1 -->
    <text class="ln" x="40" y="68" text-anchor="end">1</text>
