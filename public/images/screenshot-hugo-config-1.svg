    <text class="ln" x="40" y="452" text-anchor="end">17</text>
    <text class="kw" x="68" y="452">[[menu.main]]</text>

    <!-- 行 18 -->
    <text class="ln" x="40" y="476" text-anchor="end">18</text>
    <text class="k" x="84" y="476">name</text>
    <text class="t" x="135" y="476">=</text>
    <text class="s" x="150" y="476">"任务问题"</text>

    <!-- 行 19 -->
