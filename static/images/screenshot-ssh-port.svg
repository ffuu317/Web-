<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <style>
    .bg{ fill:#282c34; }
    .gutter{ fill:#21252b; }
    .ln{ fill:#5c6370; font-size:13px; }
    .c{ fill:#5c6370; font-style:italic; }
    .kw{ fill:#e06c75; }
    .str{ fill:#98c379; }
    .t{ fill:#abb2bf; font-size:14px; }
  </style>

  <rect class="bg" x="0" y="0" width="760" height="360"/>
  <rect class="gutter" x="0" y="0" width="44" height="360"/>
  <line x1="44" y1="0" x2="44" y2="360" stroke="#3e4451" stroke-width="1"/>

  <g font-size="14">
    <text class="ln" x="36" y="38" text-anchor="end">18</text>
    <text class="c" x="60" y="38"># For changes to take effect, run:</text>

    <text class="ln" x="36" y="62" text-anchor="end">19</text>
    <text class="c" x="60" y="62">#</text>

    <text class="ln" x="36" y="86" text-anchor="end">20</text>
    <text class="c" x="60" y="86">#   systemctl daemon-reload</text>

    <text class="ln" x="36" y="110" text-anchor="end">21</text>
    <text class="c" x="60" y="110">#   systemctl restart ssh.socket</text>

    <text class="ln" x="36" y="134" text-anchor="end">22</text>
    <text class="c" x="60" y="134">#</text>

    <text class="ln" x="36" y="162" text-anchor="end">23</text>
    <text class="kw" x="60" y="162">Port</text>
    <text class="str" x="110" y="162">2222</text>

    <text class="ln" x="36" y="186" text-anchor="end">24</text>
    <text class="c" x="60" y="186">#AddressFamily any</text>

    <text class="ln" x="36" y="210" text-anchor="end">25</text>
    <text class="c" x="60" y="210">#ListenAddress 0.0.0.0</text>

    <text class="ln" x="36" y="234" text-anchor="end">26</text>
    <text class="c" x="60" y="234">#ListenAddress ::</text>

    <text class="ln" x="36" y="258" text-anchor="end">27</text>
    <text class="t" x="60" y="258"></text>

    <text class="ln" x="36" y="282" text-anchor="end">28</text>
    <text class="c" x="60" y="282">#HostKey /etc/ssh/ssh_host_rsa_key</text>

    <text class="ln" x="36" y="306" text-anchor="end">29</text>
    <text class="c" x="60" y="306">#HostKey /etc/ssh/ssh_host_ecdsa_key</text>

    <text class="ln" x="36" y="330" text-anchor="end">30</text>
    <text class="c" x="60" y="330">#HostKey /etc/ssh/ssh_host_ed25519_key</text>
  </g>
</svg>
